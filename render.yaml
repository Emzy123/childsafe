services:
  # Backend API Service
  - type: web
    name: childsafe-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        value: https://childsafe-frontend.onrender.com
    healthCheckPath: /api

  # Frontend Service (Static Site)
  - type: web
    name: childsafe-frontend
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npx vite build --mode production
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://childsafe-api-bidv.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
