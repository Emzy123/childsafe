services:
  # Backend API Service
  - type: web
    name: childsafe-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        scope: build
        sync: false
      - key: MONGODB_URI
        scope: build
        sync: false
      - key: FRONTEND_URL
        value: https://childsafe-frontend.onrender.com
    healthCheckPath: /api

  # Frontend Service (Static Site)
  - type: web
    name: childsafe-frontend
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://childsafe-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
